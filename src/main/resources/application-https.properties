server.port=8443
server.ssl.enabled=true
server.ssl.key-store=${PATRAKOSH_SSL_KEY_STORE:.certs/patrakosh-dev.p12}
server.ssl.key-store-password=${PATRAKOSH_SSL_KEY_STORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${PATRAKOSH_SSL_KEY_ALIAS:patrakosh-dev}
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

patrakosh.auth.cookie-force-secure=true
patrakosh.cors.allowed-origins=${PATRAKOSH_CORS_ALLOWED_ORIGINS:https://localhost:5173,https://127.0.0.1:5173,https://abhaypratap08.github.io}
